<h2 style="background-color: skyblue;">Тохиргоо</h2>
<p>Энэхүү системийн хувьд тохиргооны хэсэг нь <b>Байршил, Ангилал, Төрөл, Борлуулагч</b> мөн <b>Ерөнхий тохиргоо</b> гэсэн үндсэн 5
    цэсээс бүрдэх бөгөөд эдгээр нь хөрөнгөтэй холбоотой бүхий л үйлдлүүдийг хийхэд чухал нөлөөтэй тул уг үндсэн
    талбаруудыг урьдчилан зөв тохируулж өгөх нь чухал юм.
</p>
