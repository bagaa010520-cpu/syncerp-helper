<h2 style="background-color: skyblue;">Ерөнхий бүртгэл</h2>
<p>Ерөнхий төрлийн бүртгэлд бүртгэгдсэн төрөл тус бүрд байх сонголтуудыг энэ хэсэгт бүртгэх, засварлах боломжтой.</br> 
<br><b>Жишээ нь:</b> Шагналын төрөл гэсэн нэртэй ерөнхий төрөлд шинээр “ТУЗ-ын нэрэмжит” шагналын төрөл бүртгэхэд үүнийг ашиглана.</br>
</p>
